name: refactor-hygiene

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run module refactor hygiene analyzer
        run: |
          python3 planningops/scripts/refactor_hygiene_loop.py \
            --policy-file planningops/config/refactor-hygiene-policy.json \
            --run-id ci-${{ github.run_id }}

      - name: Upload hygiene artifact
        uses: actions/upload-artifact@v4
        with:
          name: refactor-hygiene-${{ github.run_id }}
          path: |
            planningops/artifacts/refactor-hygiene/ci-${{ github.run_id }}
            planningops/artifacts/refactor-hygiene/latest.json

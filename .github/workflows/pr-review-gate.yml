name: pr-review-gate

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

jobs:
  template-and-link-check:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR description structure
        uses: actions/github-script@v7
        with:
          script: |
            const body = (context.payload.pull_request.body || "").trim();
            const requiredSections = [
              "## Summary",
              "## Scope",
              "## Linked Issues",
              "## Validation",
              "## Risks",
              "## Review Checklist",
            ];

            const missing = requiredSections.filter((s) => !body.includes(s));
            const hasIssueRef = /#\d+|https:\/\/github\.com\/[^\/]+\/[^\/]+\/issues\/\d+/i.test(body);

            if (!hasIssueRef) {
              missing.push("Issue reference (`#123` or issue URL)");
            }

            if (missing.length > 0) {
              core.setFailed(
                [
                  "PR body is missing required content:",
                  ...missing.map((x) => `- ${x}`),
                  "",
                  "Use `.github/pull_request_template.md`.",
                ].join("\n")
              );
              return;
            }

            core.notice("PR body structure validation passed.");
